# https://render.com/docs/blueprint-spec
# Render → New → Blueprint → conectar repo y seleccionar este archivo

services:
  - type: web
    name: dap-predict-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --chdir api_prediccion --bind 0.0.0.0:$PORT --timeout 120 app:app
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"

  - type: web
    name: dap-retrain-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --chdir api_reentrenamiento --bind 0.0.0.0:$PORT --timeout 600 --workers 1 app:app
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: RETRAIN_MAX_ROWS
        value: "15000"
      - key: RETRAIN_FULL_GRID
        value: "false"
